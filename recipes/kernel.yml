# yaml-language-server: $schema=https://schema.blue-build.org/module-stage-list-v1.json

modules:
  - type: dnf
    repos:
      cleanup: true
      copr:
        - bieszczaders/kernel-cachyos
        - bieszczaders/kernel-cachyos-addons  
    remove:
      auto-remove: true
      packages:
        - kernel
        - kernel-core
        - kernel-modules
        - kernel-modules-core
        - kernel-modules-extra
    install:
      allow-erasing: true
      packages:
        - kernel-cachyos
        - cachyos-settings
        - scx-scheds
        - scx-manager
  - type: script
    scripts:
      - setup-cachyos-kernel.sh
